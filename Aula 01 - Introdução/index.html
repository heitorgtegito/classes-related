<!DOCTYPE html> <!-- Versão do HTML, no caso, a 5.--> 
<html> <!-- Envolve todo o texto, ele que identifica que ali é HTML, é a marcação principal --> 
    <head> <!-- Basicamente, as configurações da página, tipo, aqui tu bota a logo que fica lá na aba em cima, bota o título da aba, bota umas info--> 
        <title>Autoria Web</title> <!-- Título da página--> 
    </head>
    <body> <!-- As infos. visíveis na página para os usuários--> 
        <h1>Minha primeira página</h1> <!-- Transforma essa frase em h1, que é um titulozao em negrito-->  
        <p>Essa é a melhor disciplina!</p> <!-- É um paragráfo--> 
        <p><strong>Hoje foi a primeira aula de HTML, com certeza essa é a melhor disciplina do curso de Informática para Internet. É uma pena que só tem uma vez por semana</strong></p> <!-- É um paragráfo, sendo que agora em negrito--> 
        <link href="estilo.css" rel="stylesheet" />
    </body>
</html>
